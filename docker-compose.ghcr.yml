# =============================================================
# 使用预构建镜像的版本（推荐大多数用户）
# -------------------------------------------------------------
# 和 docker-compose.yml 唯一的区别：app 服务用 `image` 直接拉取
# GitHub Actions 构建好并推送到 GHCR 的镜像，不需要在本机编译 Rust
# （本机编译一般要几分钟到十几分钟，拉镜像通常几十秒）。
#
# 用法：
#   docker compose -f docker-compose.ghcr.yml up -d
#
# =============================================================
services:
  app:
    image: ghcr.io/ikeeplearn/bookmark-axum-askama-htmx:latest
    container_name: bookmark-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-bookmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
      POSTGRES_REQUIRE_SSL: ${POSTGRES_REQUIRE_SSL:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_TOKEN_SECRET: "${API_TOKEN_SECRET:?missing API_TOKEN_SECRET, run: openssl rand -hex 32}"
      API_TOKEN_EXPIRE: ${API_TOKEN_EXPIRE:-1h}
      IMAGE_QUALITY: ${IMAGE_QUALITY:-80.0}
    volumes:
      - ./data/uploads:/app/upload
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookmark-net

  postgres:
    image: postgres:18-alpine
    container_name: bookmark-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bookmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bookmark}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookmark}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookmark-net

  redis:
    image: redis:7-alpine
    container_name: bookmark-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bookmark-net

volumes:
  postgres-data:
  redis-data:

networks:
  bookmark-net:
    driver: bridge
