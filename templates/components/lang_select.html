{% macro render(now) %}
<form id="lang-form" action="/i18n/switch" method="POST">
    <input type="hidden" name="t" value="{{now}}">
    <input type="hidden" name="redirect" id="redirect-input" value="">
    <select name="lang"
        class="text-[11.5px] px-2.5 py-1 rounded-md bg-paper-deep text-ink-soft border border-transparent focus:border-accent"
        onchange="document.getElementById('redirect-input').value = location.pathname + location.search; this.form.submit()">
        <option value="zh-CN" {% if "zh-CN"|is_current_lang %}selected{% endif %}>
            中文
        </option>
        <option value="en-US" {% if "en-US"|is_current_lang %}selected{% endif %}>
            English
        </option>
    </select>
</form>
{% endmacro %}
