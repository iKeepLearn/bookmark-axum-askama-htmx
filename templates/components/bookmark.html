{% macro render(is_admin,item) %}
<div
    class="group bg-white rounded-[10px] overflow-hidden border border-line shadow-sm hover:shadow-xl hover:-translate-y-0.5 transition-all duration-200 motion-reduce:transition-none flex flex-col w-full"
>
    <div class="relative aspect-16/10 overflow-hidden bg-paper-deep">
        <img
            src="{{item.cover_image}}"
            loading="lazy"
            class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-[1.045] motion-reduce:transition-none"
        />
        {% if is_admin %}

        <div
            class="absolute top-2 right-2 flex gap-1.5 opacity-0 -translate-y-1 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-150"
        >
            <a
                href="/manage/bookmark/edit?id={{item.id}}"
                target="_blank"
                class="w-7 h-7 rounded-md bg-white/90 border border-ink/10 backdrop-blur-sm flex items-center justify-center text-ink-soft hover:bg-accent hover:text-white transition-colors"
                title="编辑"
            >
                <svg
                    width="14"
                    height="14"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <path d="M12 20h9" />
                    <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z" />
                </svg>
            </a>
            <form
                name="deleteNavForm"
                action="/manage/bookmark/delete"
                method="post"
                onsubmit="return confirm('确认删除这条书签？');"
            >
                <input
                    class="hidden"
                    name="id"
                    type="number"
                    value="{{item.id}}"
                />
                <button
                    class="w-7 h-7 rounded-md bg-white/90 border cursor-pointer border-ink/10 backdrop-blur-sm flex items-center justify-center text-ink-soft hover:bg-danger hover:text-white transition-colors"
                    type="submit"
                    title="删除"
                >
                    <svg
                        width="14"
                        height="14"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                    >
                        <path d="M3 6h18" />
                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        <path
                            d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"
                        />
                    </svg>
                </button>
            </form>
        </div>
        {% endif %}
    </div>

    <div
        class="relative h-px bg-[linear-gradient(to_right,#E1DCCF_60%,transparent_0%)] bg-size:[10px_1px] bg-repeat-x before:content-[''] before:absolute before:-left-1.75 before:top-1/2 before:-translate-y-1/2 before:w-3.5 before:h-3.5 before:rounded-full before:bg-white before:shadow-[inset_0_0_0_1px_#E1DCCF] after:content-[''] after:absolute after:-right-1.75 after:top-1/2 after:-translate-y-1/2 after:w-3.5 after:h-3.5 after:rounded-full after:bg-white after:shadow-[inset_0_0_0_1px_#E1DCCF]"
    ></div>

    <div class="px-4 py-3.5 flex flex-col gap-2 flex-1">
        {% if !item.tags.is_empty() %}
        <div class="flex flex-wrap gap-1.5">
            {% for tag in item.tags %}
            <span
                class="text-[10.5px] font-mono text-accent-ink bg-accent-soft px-1.5 py-0.5 rounded"
                >{{ tag }}</span
            >
            {% endfor %}
        </div>
        {% endif %}

        <div
            class="font-display font-semibold text-[15.5px] leading-snug text-ink"
        >
            <a
                href="{{item.url}}"
                target="_blank"
                rel="noreferrer"
                class="hover:text-accent-ink transition-colors"
                >{{item.title}}</a
            >
        </div>

        <div class="flex items-center justify-between mt-0.5">
            <span
                class="inline-flex items-center gap-1 font-mono text-[10px] text-ink-soft border border-dashed border-[#C9C2AE] px-1.5 py-0.5 rounded"
            >
                <svg
                    width="11"
                    height="11"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    class="opacity-60"
                >
                    <rect x="3" y="4" width="18" height="18" rx="2" />
                    <path d="M16 2v4M8 2v4M3 10h18" />
                </svg>
                {{item.created_at}}
            </span>
        </div>
    </div>
</div>
{% endmacro %}
