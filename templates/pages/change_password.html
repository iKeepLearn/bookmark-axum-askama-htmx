{% extends "layouts/base.html" %} {% block title %}{{"changepwd-heading"|t}}{%
endblock title %} {% block content %}
<main
    class="max-w-3xl mx-auto w-full p-4 min-h-screen flex flex-col items-center justify-center"
>
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="font-display font-bold text-2xl text-ink mb-1">
                {{"changepwd-heading"|t}}
            </div>
            <div
                class="font-mono text-[11px] uppercase tracking-widest text-ink-faint"
            >
                change password
            </div>
        </div>

        {% if !msg.is_empty() %}
        <div
            class="mb-5 rounded-lg bg-danger-soft border border-danger/20 px-4 py-3"
        >
            <p class="text-danger text-sm text-center">{{msg}}</p>
        </div>
        {% endif %}

        <div class="bg-white border border-line rounded-xl shadow-sm p-6">
            <form action="/manage/changepwd" method="post">
                <div class="flex flex-col gap-5">
                    <div class="w-full">
                        <label
                            class="block font-mono text-[10.5px] uppercase tracking-[0.08em] text-ink-faint mb-1.5"
                        >
                            {{"changepwd-current-password-label"|t}}</label
                        >
                        <input
                            type="password"
                            placeholder='{{"changepwd-current-password-placeholder"|t}}'
                            name="current_password"
                            class="px-3.5 py-2.5 border border-line rounded-lg w-full text-sm text-ink placeholder:text-ink-faint focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition-colors"
                        />
                    </div>
                    <div class="w-full">
                        <label
                            class="block font-mono text-[10.5px] uppercase tracking-[0.08em] text-ink-faint mb-1.5"
                        >
                            {{"changepwd-new-password-label"|t}}</label
                        >
                        <input
                            type="password"
                            placeholder='{{"changepwd-new-password-placeholder"|t}}'
                            name="new_password"
                            class="px-3.5 py-2.5 border border-line rounded-lg w-full text-sm text-ink placeholder:text-ink-faint focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition-colors"
                        />
                    </div>
                    <div class="w-full">
                        <label
                            class="block font-mono text-[10.5px] uppercase tracking-[0.08em] text-ink-faint mb-1.5"
                        >
                            {{"changepwd-confirm-password-label"|t}}</label
                        >
                        <input
                            type="password"
                            placeholder='{{"changepwd-confirm-password-placeholder"|t}}'
                            name="new_password_check"
                            class="px-3.5 py-2.5 border border-line rounded-lg w-full text-sm text-ink placeholder:text-ink-faint focus:outline-none focus:ring-2 focus:ring-accent focus:border-accent transition-colors"
                        />
                    </div>

                    <button
                        type="submit"
                        class="mt-1 px-4 py-2.5 inline-flex items-center justify-center bg-accent text-white font-medium text-sm rounded-lg shadow-sm hover:bg-accent-ink transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-accent focus-visible:ring-offset-2"
                    >
                        {{"changepwd-submit"|t}}
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
{% endblock content %}
